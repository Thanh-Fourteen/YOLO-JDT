repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(third_party/|YOLO_JDT_Research_Document\.md|plans/)
      - id: end-of-file-fixer
        exclude: ^(third_party/|YOLO_JDT_Research_Document\.md)
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.0.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-tqdm]
        args: [--config-file=pyproject.toml]
        exclude: ^(third_party/|yolo_jdt/tests/|yolo_jdt/scripts/)
