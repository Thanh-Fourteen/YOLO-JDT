# YOLO11-JDE (joint detect + ReID) — Step 4 / Phase 4 config.
# Override on command line, e.g.:
#   python -m yolo_jdt.scripts.train_jde -cn jde model.stage=A trainer.max_epochs=5
#   python -m yolo_jdt.scripts.train_jde -cn jde model.stage=B trainer.max_epochs=15 \
#       model.pretrained_weights=runs/jde/stage_a/last.ckpt model.lr0=0.0001

defaults:
  - _self_

seed: 0
run_name: jde_yolo11s_stageA
output_dir: runs/jde/${run_name}

model:
  scale: s                              # s | m
  nc: 1                                 # person only
  reg_max: 16
  imgsz: 640
  # Init from Step 3.A's promoted detection-only checkpoint (recommended for Stage A).
  # For Stage B resume, point this at a stage_a Lightning .ckpt — the loader
  # handles both the standalone .pt and Lightning .ckpt formats.
  pretrained_weights: weights/ours/yolo11s_det.pt
  channels_last: true

  # Loss gains (detection)
  box_gain: 7.5
  cls_gain: 0.5
  dfl_gain: 1.5

  # ReID head
  reid_dim: 128
  reid_hidden: 256
  num_track_ids: -1                     # -1 = auto (set from datamodule.num_track_ids)
  lambda_reid: 0.1

  # Optimizer (Stage A: full LR; Stage B: LR/10 via stage_b_lr_scale)
  lr0: 0.001                            # Linear-scaled for bs=8 single-GPU (memory feedback_lr_scaling)
  lrf: 0.01
  momentum: 0.937
  weight_decay: 5.0e-4
  warmup_epochs: 1.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.01

  # EMA
  ema_decay: 0.9999
  ema_tau: 2000

  # 2-stage training control
  stage: A                              # "A" = freeze BB+neck; "B" = unfreeze
  stage_b_lr_scale: 0.1                 # Multiply lr0 by this when stage=B

data:
  standard_root: datasets/standard
  imgsz: ${model.imgsz}
  batch_size: 8                         # bs=8 single-GPU like Step 3.A
  num_workers: 4
  mosaic_p: 1.0
  hsv: [0.015, 0.7, 0.4]
  flip_p: 0.5
  aug_scale: 0.5
  aug_translate: 0.1
  person_only: true
  use_crowdhuman: true
  use_mot17: true
  mot17_train_split: train_half

trainer:
  max_epochs: 5                         # Stage A default; override to 15 for Stage B
  precision: bf16-mixed
  devices: 1
  accelerator: gpu
  strategy: auto
  sync_batchnorm: false
  gradient_clip_val: 10.0
  log_every_n_steps: 20
  check_val_every_n_epoch: 1
  val_check_interval: 1.0

# Mosaic-close: turn off mosaic at this fraction of total epochs
close_mosaic_fraction: 0.85

wandb:
  enabled: true
  project: yolo-jdt
  group: phase4
  notes: ""
